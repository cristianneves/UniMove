services:
  postgres:
    image: postgres:16-alpine
    container_name: unimove-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unimove
      POSTGRES_USER: unimove
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - unimove_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimove -d unimove"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  unimove_pgdata:
