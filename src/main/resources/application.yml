spring:
  application:
    name: unimove
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/unimove}
    username: ${DATABASE_USER:unimove}
    password: ${DATABASE_PASSWORD:changeme}
  jpa:
    hibernate:
      # Schema gerenciado por Flyway. Hibernate APENAS valida — nunca altera.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    # Em prod, JWT_SECRET vem do ambiente. Default aqui so para nao quebrar startup em dev local.
    secret: ${JWT_SECRET:dev-secret-NAO-USE-EM-PRODUCAO-troque-via-env-var}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  osrm:
    base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}
  ride:
    # Formula de tarifa — centralizada para ajuste facil.
    bandeira: 5.50
    preco-por-km: 2.10
    preco-por-min: 0.20

logging:
  level:
    root: INFO
    com.unimove: INFO
